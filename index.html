<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Kinetic Drop</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="anim center" id="f01">
  <div class="word-a">A MAN</div>
  <div class="word-b">SAT IN</div>
  <div class="word-c" style="position:relative">TRAFFIC<div class="underline"></div></div>
</div>
<style>
body{background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden;font-family:'Bebas Neue',sans-serif}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100vw;height:100vh}
.word-a{font-size:22vw;color:#FF6B00;line-height:.9;text-align:center;letter-spacing:.02em;transform:translateY(-120px) scale(.6);opacity:0;transition:transform .5s cubic-bezier(.34,1.3,.64,1),opacity .3s ease}
.word-b{font-size:16vw;color:#0A0A0A;line-height:.95;text-align:center;transform:translateY(-60px);opacity:0;transition:transform .5s .08s cubic-bezier(.34,1.2,.64,1),opacity .3s .08s ease}
.word-c{font-size:16vw;color:#0A0A0A;line-height:.95;text-align:center;transform:translateY(-40px);opacity:0;transition:transform .5s .15s cubic-bezier(.34,1.2,.64,1),opacity .3s .15s ease}
.underline{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);height:4px;background:#FF6B00;border-radius:2px;width:0;transition:width .5s .6s ease}
.go .word-a{transform:translateY(0) scale(1);opacity:1}
.go .word-b{transform:translateY(0);opacity:1}
.go .word-c{transform:translateY(0);opacity:1}
.go .underline{width:100%}
</style>
<script>window.onload=()=>{setTimeout(()=>document.getElementById('f01').classList.add('go'),100)}</script>

</body>
</html>
