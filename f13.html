<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Staccato Beat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;background:#fff;gap:3vw;padding:0 10vw">
  <div class="sline"><div class="sbar"></div><div class="stxt">SAME TOPIC.</div></div>
  <div class="sline fr"><div class="sbar"></div><div class="stxt">SAME FACE.</div></div>
  <div class="sline"><div class="sbar"></div><div class="stxt">SAME EDIT.</div></div>
  <div class="sline fr"><div class="sbar ab"></div><div class="stxt at">TWO LINES.</div></div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'Bebas Neue',sans-serif}
.sline{display:flex;align-items:center;gap:3vw;transform:translateX(-50vw);opacity:0;transition:transform .3s cubic-bezier(.34,1.2,.64,1),opacity .2s ease}
.sline.fr{transform:translateX(50vw)}
.sbar{width:4px;height:8vw;background:#E5E5EA;border-radius:2px;flex-shrink:0;transition:background .2s,height .2s}
.sbar.ab{background:#FF6B00;height:11vw}
.stxt{font-size:11vw;color:#C8C8CC;letter-spacing:.03em;transition:color .2s,font-size .2s}
.stxt.at{color:#0A0A0A;font-size:13vw}
.go .sline:nth-child(1){transform:translateX(0);opacity:1;transition-delay:.0s}
.go .sline:nth-child(2){transform:translateX(0);opacity:1;transition-delay:.18s}
.go .sline:nth-child(3){transform:translateX(0);opacity:1;transition-delay:.36s}
.go .sline:nth-child(4){transform:translateX(0);opacity:1;transition-delay:.54s}
</style>
<script>window.onload=()=>{setTimeout(()=>document.body.classList.add('go'),100)}</script>

</body>
</html>
