<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Breathing Frame</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:6vw">
  <div class="b-text">That same structure applied to your content does not produce attention.<br><br><strong>It produces sales.</strong></div>
  <div class="b-dot"></div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'DM Sans',sans-serif}
.b-text{font-size:6vw;font-weight:300;color:#0A0A0A;text-align:center;line-height:1.5;padding:0 10vw;opacity:0;transition:opacity 1s ease}
.b-text strong{font-weight:700}
.b-dot{width:10px;height:10px;background:#FF6B00;border-radius:50%;opacity:0;transform:scale(0);transition:opacity .4s .8s ease,transform .4s .8s cubic-bezier(.34,1.5,.64,1)}
.go .b-text{opacity:1}
.go .b-dot{opacity:1;transform:scale(1)}
</style>
<script>window.onload=()=>{setTimeout(()=>document.body.classList.add('go'),100)}</script>

</body>
</html>
