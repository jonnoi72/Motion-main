<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Dark Break</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0A0A0A;gap:6vw">
  <div class="dark-txt">Here is the part that should <strong>sit uncomfortably.</strong></div>
  <div class="dark-sub">Theme Break · One Frame Only</div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'DM Sans',sans-serif}
.dark-txt{font-size:7vw;font-weight:300;color:white;text-align:center;line-height:1.5;padding:0 10vw;opacity:0;transform:translateY(12px);transition:opacity .7s ease,transform .6s ease}
.dark-txt strong{font-weight:700;color:#FF6B00}
.dark-sub{font-family:'DM Mono',monospace;font-size:3vw;color:rgba(255,255,255,.3);text-align:center;letter-spacing:.1em;text-transform:uppercase;opacity:0;transition:opacity .4s .8s ease}
.go .dark-txt{opacity:1;transform:translateY(0)}
.go .dark-sub{opacity:1}
</style>
<script>window.onload=()=>{setTimeout(()=>document.body.classList.add('go'),100)}</script>

</body>
</html>
