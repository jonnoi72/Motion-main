<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Text Slam</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:12px">
  <div class="pre">And someone built it</div>
  <div style="position:relative;text-align:center;width:100%;padding:0 6vw">
    <div class="slam">DELIBERATELY</div>
    <div class="uline"></div>
  </div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'Bebas Neue',sans-serif}
.pre{font-family:'DM Mono',monospace;font-size:3.5vw;color:#8A8A8E;letter-spacing:.1em;text-transform:uppercase;text-align:center;opacity:0;transition:opacity .3s ease}
.slam{font-size:14vw;color:#0A0A0A;text-align:center;letter-spacing:.01em;transform:translateY(-40px) scale(.5);opacity:0;transition:transform .35s .15s cubic-bezier(.34,1.4,.64,1),opacity .2s .15s ease}
.uline{height:5px;background:#FF6B00;border-radius:3px;width:0;transition:width .4s .55s ease;margin-top:6px}
.go .pre{opacity:1}
.go .slam{transform:translateY(0) scale(1);opacity:1}
.go .uline{width:100%}
</style>
<script>window.onload=()=>{setTimeout(()=>document.body.classList.add('go'),100)}</script>

</body>
</html>
