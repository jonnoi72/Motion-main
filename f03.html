<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Motion Label</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="f03" style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F8F8F8;gap:24px">
  <div style="position:relative">
    <div class="phone-big"><div class="notch"></div><div class="pbar"><div class="pbar-fill"></div></div></div>
    <div class="track-pill"><div class="track-dot"></div>0:38</div>
    <div class="counter-pill">× 3</div>
  </div>
  <div class="caption">THIRD <span style="color:#FF6B00">TIME.</span></div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'Bebas Neue',sans-serif}
.phone-big{width:28vw;height:46vw;border:3px solid #0A0A0A;border-radius:20px;background:linear-gradient(160deg,#E0E0E0,#C8C8C8);position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;gap:4px;box-shadow:0 12px 36px rgba(0,0,0,.12);transform:translateY(60px);opacity:0;transition:transform .5s cubic-bezier(.34,1.2,.64,1),opacity .3s ease}
.notch{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:40%;height:10px;background:#0A0A0A;border-radius:5px}
.pbar{width:100%;height:3px;background:rgba(255,255,255,.3);border-radius:2px;position:relative}
.pbar-fill{position:absolute;left:0;top:0;height:100%;background:#FF6B00;border-radius:2px;width:0;transition:width .8s .5s ease}
.track-pill{position:absolute;top:-14px;right:-44px;background:#FF6B00;color:white;font-family:'DM Mono',monospace;font-size:3vw;padding:4px 10px;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:6px;transform:translateX(80px);opacity:0;transition:transform .4s .6s cubic-bezier(.34,1.3,.64,1),opacity .3s .6s ease}
.track-dot{width:6px;height:6px;background:white;border-radius:50%}
.counter-pill{position:absolute;bottom:-14px;left:-36px;background:#0A0A0A;color:white;font-size:8vw;padding:4px 10px;border-radius:20px;transform:translateX(-60px);opacity:0;transition:transform .4s .75s cubic-bezier(.34,1.3,.64,1),opacity .3s .75s ease}
.caption{font-size:14vw;color:#0A0A0A;text-align:center;letter-spacing:.02em;opacity:0;transform:translateY(20px);transition:opacity .4s .9s ease,transform .4s .9s ease}
.go .phone-big{transform:translateY(0);opacity:1}
.go .pbar-fill{width:62%}
.go .track-pill{transform:translateX(0);opacity:1}
.go .counter-pill{transform:translateX(0);opacity:1}
.go .caption{opacity:1;transform:translateY(0)}
</style>
<script>window.onload=()=>{setTimeout(()=>document.querySelector('#f03').parentElement.classList.add('go'),100);document.querySelector('#f03').id='wrapper'}</script>
<script>window.onload=()=>{setTimeout(()=>{document.body.classList.add('go')},100)}</script>

</body>
</html>
