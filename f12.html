<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Before After</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:row;overflow:hidden">
  <div class="ba-left"><div class="ba-unit">Before</div><div class="ba-num" id="lnum">0</div><div class="ba-label">Seconds watch time</div></div>
  <div class="ba-right"><div class="ba-unit">After</div><div class="ba-num" id="rnum">0</div><div class="ba-label">Seconds watch time</div></div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'Bebas Neue',sans-serif}
.ba-left{width:40%;height:100vh;background:#F2F2F7;border-right:4px solid #FF6B00;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vw;padding:4vw;transform:translateX(-100%);transition:transform .5s cubic-bezier(.34,1.2,.64,1)}
.ba-right{width:60%;height:100vh;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2vw;padding:4vw;transform:translateX(100%);transition:transform .5s .06s cubic-bezier(.34,1.2,.64,1)}
.ba-unit{font-family:'DM Mono',monospace;font-size:3vw;color:#8A8A8E;letter-spacing:.1em;text-transform:uppercase}
.ba-right .ba-unit{color:#FF6B00}
.ba-num{font-size:30vw;color:#8A8A8E;line-height:.85}
.ba-right .ba-num{color:#FF6B00;font-size:38vw}
.ba-label{font-family:'DM Mono',monospace;font-size:2.5vw;color:#8A8A8E;letter-spacing:.08em;text-transform:uppercase;text-align:center;line-height:1.4}
.go .ba-left,.go .ba-right{transform:translateX(0)}
</style>
<script>
window.onload=()=>{
  setTimeout(()=>document.body.classList.add('go'),100);
  let t=0;const iv=setInterval(()=>{
    t+=60;
    const pL=Math.min(1,(t-300)/1200);
    const pR=Math.min(1,(t-400)/1500);
    if(pL>0)document.getElementById('lnum').textContent=Math.round(pL*6);
    if(pR>0)document.getElementById('rnum').textContent=Math.round(pR*41);
    if(t>2000)clearInterval(iv);
  },60);
}
</script>

</body>
</html>
