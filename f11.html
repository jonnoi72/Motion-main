<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Word Isolation</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:3vw">
  <div class="iso-tag">Not curiosity. Something closer to...</div>
  <div class="iso-word iso-active" id="iw0">GAP</div>
  <div class="iso-word" id="iw1">CURIOSITY</div>
  <div class="iso-word" id="iw2">DISCOMFORT</div>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'Bebas Neue',sans-serif}
.iso-tag{font-family:'DM Mono',monospace;font-size:3vw;color:#8A8A8E;letter-spacing:.1em;text-transform:uppercase;text-align:center;opacity:0;transition:opacity .4s ease}
.iso-word{font-size:13vw;color:#C8C8CC;letter-spacing:.06em;text-align:center;transition:font-size .25s ease,color .25s ease}
.iso-word.iso-active{font-size:20vw;color:#0A0A0A}
.iso-word.iso-accent{color:#FF6B00;font-size:20vw}
.go .iso-tag{opacity:1}
</style>
<script>
window.onload=()=>{
  setTimeout(()=>document.body.classList.add('go'),100);
  setTimeout(()=>{document.getElementById('iw0').classList.remove('iso-active');document.getElementById('iw1').classList.add('iso-active')},1300);
  setTimeout(()=>{document.getElementById('iw1').classList.remove('iso-active');document.getElementById('iw2').classList.add('iso-accent')},2600);
}
</script>

</body>
</html>
