<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint — Node Map</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div style="width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:4vw">
  <div class="map-head">Each sentence. A node.</div>
  <svg width="70vw" height="70vw" viewBox="0 0 240 290" style="overflow:visible">
    <line x1="120" y1="30" x2="60" y2="110" stroke="#E5E5EA" stroke-width="2" class="el"/>
    <line x1="120" y1="30" x2="180" y2="110" stroke="#E5E5EA" stroke-width="2" class="el"/>
    <line x1="60" y1="110" x2="120" y2="190" stroke="#E5E5EA" stroke-width="2" class="el"/>
    <line x1="180" y1="110" x2="120" y2="190" stroke="#E5E5EA" stroke-width="2" class="el"/>
    <line x1="120" y1="190" x2="120" y2="260" stroke="#FF6B00" stroke-width="2" stroke-dasharray="6,4" class="el"/>
    <circle cx="120" cy="30" r="22" fill="#FF6B00" class="ec"/>
    <circle cx="60" cy="110" r="18" fill="#FF6B00" opacity=".75" class="ec"/>
    <circle cx="180" cy="110" r="18" fill="#FF6B00" opacity=".75" class="ec"/>
    <circle cx="120" cy="190" r="16" fill="#FF6B00" opacity=".55" class="ec"/>
    <circle cx="120" cy="260" r="13" fill="#FF6B00" opacity=".35" class="ec"/>
    <text x="120" y="35" text-anchor="middle" font-family="DM Mono,monospace" font-size="9" fill="white" font-weight="500">START</text>
  </svg>
</div>
<style>
body{margin:0;overflow:hidden;font-family:'DM Mono',monospace}
.map-head{font-size:3.5vw;color:#8A8A8E;letter-spacing:.12em;text-transform:uppercase;text-align:center;opacity:0;transition:opacity .4s ease}
.ec{transform-origin:center;transform:scale(0);transition:transform .35s cubic-bezier(.34,1.5,.64,1)}
.el{stroke-dasharray:200;stroke-dashoffset:200;transition:stroke-dashoffset .4s ease}
.go .map-head{opacity:1}
.go .ec:nth-child(6){transform:scale(1);transition-delay:.1s}
.go .ec:nth-child(7){transform:scale(1);transition-delay:.35s}
.go .ec:nth-child(8){transform:scale(1);transition-delay:.5s}
.go .ec:nth-child(9){transform:scale(1);transition-delay:.7s}
.go .ec:nth-child(10){transform:scale(1);transition-delay:.9s}
.go .el:nth-child(1){stroke-dashoffset:0;transition-delay:.2s}
.go .el:nth-child(2){stroke-dashoffset:0;transition-delay:.3s}
.go .el:nth-child(3){stroke-dashoffset:0;transition-delay:.45s}
.go .el:nth-child(4){stroke-dashoffset:0;transition-delay:.55s}
.go .el:nth-child(5){stroke-dashoffset:0;transition-delay:.75s}
</style>
<script>window.onload=()=>{setTimeout(()=>document.body.classList.add('go'),100)}</script>

</body>
</html>
